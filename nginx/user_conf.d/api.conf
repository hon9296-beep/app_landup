server {
    listen 443 ssl;
    http2 on;
    server_name api.landup.site;

    ssl_certificate /etc/letsencrypt/live/api.landup.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.landup.site/privkey.pem;

    client_max_body_size 100M;

    # ── 외부 차단: Java ↔ Python worker 내부 통신 전용 엔드포인트 ──
    # 외부에서 호출 시 임의 job 상태 변경 / 가짜 분석 결과 주입 가능 → 404 위장.
    # ^~ prefix 매칭 우선. context-path /api 포함 두 경로 모두 차단.
    location ^~ /api/internal/ {
        deny all;
        return 404;
    }
    location ^~ /internal/ {
        deny all;
        return 404;
    }

    location / {
        proxy_pass http://backend-java:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}
