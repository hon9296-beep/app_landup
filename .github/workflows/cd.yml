name: CD

on:
  push:
    branches: ["main"]

env:
  AWS_REGION: ap-northeast-2

jobs:
  # ── Frontend → S3 + CloudFront ──
  frontend:
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        # 2026-05-25: OAuth/Toss 시크릿 전부 제거 — 빈 값 빌드 시 Login.tsx / SignUp.tsx / PayPage 가 자동 비활성.
        # 시연 로그인은 DemoUserSeeder 가 부팅 시 자동 생성한 계정 사용 (이메일/비번).
        # 재활성화 시 GitHub Secrets 에 키 등록 + 본 env 블록에 줄 추가.
        run: npx vite build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3
        run: aws s3 sync dist/ s3://${{ secrets.S3_BUCKET_NAME }} --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

  # ── Python 배치 엔진 → ECR ──
  backend-python:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Python image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./backend/python
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest ./backend/python
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

  # ── Java 백엔드 → ECR ──
  backend-java:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Java image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_JAVA_REPOSITORY: ${{ secrets.ECR_JAVA_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_JAVA_REPOSITORY:$IMAGE_TAG ./backend/java
          docker build -t $ECR_REGISTRY/$ECR_JAVA_REPOSITORY:latest ./backend/java
          docker push $ECR_REGISTRY/$ECR_JAVA_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_JAVA_REPOSITORY:latest

  # ── Python 배치 엔진 환경변수 목록 (EC2 .env / docker-compose.prod.yml 에 추가 필요) ──
  # INTERNAL_API_KEY   : Java↔Python 내부 인증 키 (양쪽 동일 값, openssl rand -hex 32)
  # ALLOWED_ORIGINS    : Java CORS 허용 출처 (예: https://landup.site)

  # ── EC2 배포 (MySQL + Python + Java 동시) ──
  # 2026-05-25 변경:
  #   - DB 가 docker MySQL 로 전환 — seed-db 잡 별도 분리 폐기 (GitHub Runner 에서 RDS 외부 접속 불가).
  #   - DB seed 는 EC2 안에서 `docker-compose exec` 로 실행 (mysql healthcheck 통과 후).
  deploy:
    runs-on: ubuntu-latest
    needs: [backend-python, backend-java]
    environment: production

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            aws ecr get-login-password --region ap-northeast-2 | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}
            cd ~
            docker-compose -f docker-compose.prod.yml pull
            docker-compose -f docker-compose.prod.yml up -d
            # mysql healthcheck 통과 대기 (최초 부팅 시 init_v2.sql 적용 시간 포함)
            echo "[deploy] waiting for mysql healthy..."
            for i in $(seq 1 30); do
              status=$(docker inspect -f '{{.State.Health.Status}}' $(docker-compose -f docker-compose.prod.yml ps -q mysql) 2>/dev/null || echo "starting")
              if [ "$status" = "healthy" ]; then echo "[deploy] mysql healthy"; break; fi
              sleep 5
            done
            # Python catalog 시드 (멱등 — ON DUPLICATE KEY UPDATE)
            docker-compose -f docker-compose.prod.yml exec -T placement-engine python scripts/seed_from_source.py || echo "[deploy] seed skipped or failed — check logs"
            # nginx + worker 재시작 — backend-java 컨테이너 IP 변경 시 캐싱 회피 (2026-05-01)
            docker-compose -f docker-compose.prod.yml restart nginx worker
            docker image prune -f
