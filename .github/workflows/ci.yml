name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main", "dev"]

jobs:
  frontend:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      contains(join(github.event.pull_request.changed_files.*.filename, ','), 'frontend/')
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npx vite build

  backend:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      contains(join(github.event.pull_request.changed_files.*.filename, ','), 'backend/python/')
    defaults:
      run:
        working-directory: backend/python

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v || echo "테스트 미구성 — 스킵"

  backend-java:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      contains(join(github.event.pull_request.changed_files.*.filename, ','), 'backend/java/')
    defaults:
      run:
        working-directory: backend/java

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Compile check
        run: chmod +x gradlew && ./gradlew compileJava --no-daemon
