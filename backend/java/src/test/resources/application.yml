# 테스트 전용 설정 — h2 인메모리 + ddl-auto=create-drop
# main application.yml 의 validate (init_v2.sql 전제) 대신 Entity 기반 자동 생성.
# Redis / Placement-Engine 등 외부 의존성 autoconfig 제외.
spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# 테스트용 JWT secret (길이 요건 충족)
jwt:
  secret: test-secret-key-at-least-32-characters-long-for-testing-only
  access-expiry-ms: 900000
  refresh-expiry-ms: 604800000
  cookie-secure: false

placement:
  engine-url: http://localhost:8000

file:
  upload-dir: ./test-uploads
