server:
  port: ${SERVER_PORT:8081}  # 로컬: 8081, Docker: 8080 (docker-compose에서 환경변수로 주입)
  servlet:
    context-path: /api  # 전 엔드포인트에 /api/ prefix 자동 적용

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:landup}?useSSL=false&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 환경변수 fallback 으로 환경별 분기 (로컬 default 10, prod 20)
    hikari:
      maximum-pool-size: ${HIKARI_POOL_SIZE:10}
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  # Jackson 응답 직렬화 — default camelCase (Spring 기본).
  # snake_case 가 필요한 DTO 는 @JsonNaming(LandupApplication.AggressiveSnakeCaseJacksonStrategy.class) 로 opt-in.
  # (2026-05-15: 글로벌 @Bean 폐기 — camel 기대 DTO 까지 변환되어 프론트 회귀 발생했었음)
  jpa:
    hibernate:
      ddl-auto: validate  # init_v2.sql 로 스키마 선생성 → JPA 는 Entity↔DB 일치만 검증
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        # 환경변수 fallback (로컬 UTC, prod Asia/Seoul)
        jdbc:
          time_zone: ${HIBERNATE_TIMEZONE:UTC}
    # naming 전략은 LandupApplication.AggressiveSnakeCaseStrategy 가 @Bean 으로 주입됨
    # (centerXMm → center_x_mm 등 연속 대문자 케이스까지 처리)

  # Gmail SMTP (이메일 인증 발송)
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${GMAIL_USER:}
    password: ${GMAIL_APP_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.starttls.required: true

  # Redis (비동기 작업 큐 — B안)
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 3000ms
      repositories:
        enabled: false  # JPA Repository를 Redis Repository로 오인하는 충돌 방지

# Python 배치 엔진 서버 주소
placement:
  engine-url: ${PLACEMENT_ENGINE_URL:http://localhost:8000}

# CORS 허용 출처 — 쉼표 구분. prod에서는 실제 도메인만 열것.
cors:
  allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# Java→Python 내부 통신 인증 키
internal:
  api-key: ${INTERNAL_API_KEY:}

# 브루트포스 방어 Rate Limit (Redis 기반, IP 단위)
rate-limit:
  login:
    max: ${RL_LOGIN_MAX:10}
    window-sec: ${RL_LOGIN_WINDOW_SEC:600}
  signup:
    max: ${RL_SIGNUP_MAX:5}
    window-sec: ${RL_SIGNUP_WINDOW_SEC:600}
  refresh:
    max: ${RL_REFRESH_MAX:20}
    window-sec: ${RL_REFRESH_WINDOW_SEC:60}
  oauth:
    max: ${RL_OAUTH_MAX:10}
    window-sec: ${RL_OAUTH_WINDOW_SEC:600}

# 네이버 OAuth
naver:
  client-id: ${NAVER_CLIENT_ID:}
  client-secret: ${NAVER_CLIENT_SECRET:}

# 구글 OAuth
# redirect-uri: nested placeholder — FRONTEND_URL 만 박으면 자동 조립.
#   예: FRONTEND_URL=https://landup.site → https://landup.site/google/callback
google:
  client-id: ${GOOGLE_CLIENT_ID:}
  client-secret: ${GOOGLE_CLIENT_SECRET:}
  redirect-uri: ${GOOGLE_REDIRECT_URI:${FRONTEND_URL:http://localhost:3000}/google/callback}

# 카카오 OAuth
kakao:
  rest-api-key: ${KAKAO_REST_API_KEY:}
  client-secret: ${KAKAO_CLIENT_SECRET:}
  redirect-uri: ${KAKAO_REDIRECT_URI:${FRONTEND_URL:http://localhost:3000}/kakao/callback}

# 파일 업로드
file:
  upload-dir: ${UPLOAD_DIR:./uploads}

# AWS S3 (박물관 원본 이관 — floor_archive / brand_archive, 2026-04-27 추가)
# 변수명은 .env 의 기존 키와 통일 (AWS_S3_BUCKET, AWS_REGION).
aws:
  access-key-id: ${AWS_ACCESS_KEY_ID:}
  secret-access-key: ${AWS_SECRET_ACCESS_KEY:}
  region: ${AWS_REGION:ap-northeast-2}
  s3:
    bucket-name: ${AWS_S3_BUCKET:}

# GLB 저장소 — Python glb_storage 와 동일 루트 공유
# Python: {backend}/storage/glb/{uuid}.glb — backend 는 Python 이 __file__ 기준 자동 계산
# Java : glb.base-dir 아래에 Python 이 반환한 glb_path (예: 'storage/glb/xxx.glb') 를 join 해 읽음
# 기본값 './' = bootRun 워킹디렉토리 기준. bootRun 을 backend/java/ 에서 실행하는 경우 '../' 로 override 필요
glb:
  base-dir: ${GLB_BASE_DIR:../}

# 레퍼런스 이미지 저장소 — 관리자 파일 교체 시 storage/refimage/{sha256}.{ext} 로 저장
# Python ref_image_loader 도 동일 루트 사용 (file_path 컬럼이 'storage/refimage/...' 상대경로)
# 기본값 '../' = bootRun 워킹디렉토리(backend/java) 기준 backend/ 디렉토리
refimage:
  base-dir: ${REFIMAGE_BASE_DIR:../storage/refimage}
  # 허용 확장자 (소문자, 콤마 구분)
  allowed-extensions: ${REFIMAGE_ALLOWED_EXT:jpg,jpeg,png,webp}
  # 최대 파일 크기 (bytes, 기본 10MB)
  max-size-bytes: ${REFIMAGE_MAX_SIZE:10485760}

# 토스페이먼츠
toss:
  secret-key: ${TOSS_SECRET_KEY:}
  client-key: ${TOSS_CLIENT_KEY:}

# 이메일 인증
email:
  verification:
    base-url: ${FRONTEND_URL:http://localhost:3000}
    expiry-minutes: ${EMAIL_VERIFY_EXPIRY_MIN:30}

# 시연 계정 — 부팅 시 환경변수 박혀있으면 DemoUserSeeder 가 자동 생성/갱신 (멱등 upsert).
# membership: basic / premium / max — 시연용으로 max 추천 (플랜 락 우회).
# 로컬/prod 둘 다 동일 패턴. email/password 빈 값이면 seed skip.
demo:
  user:
    email: ${DEMO_USER_EMAIL:}
    password: ${DEMO_USER_PASSWORD:}
    name: ${DEMO_USER_NAME:Demo User}
    membership: ${DEMO_USER_MEMBERSHIP:basic}

# JWT
# 환경별 분기는 docker-compose.prod.yml 의 environment 가 담당.
# 로컬: JWT_COOKIE_SECURE 안 박힘 → false. prod: JWT_COOKIE_SECURE=true 명시.
jwt:
  secret: ${JWT_SECRET:landup-jwt-secret-key-must-be-at-least-32-characters-long-change-in-prod}
  access-expiry-ms: ${JWT_ACCESS_EXPIRY_MS:1209600000}      # 14일
  refresh-expiry-ms: ${JWT_REFRESH_EXPIRY_MS:604800000} # 7일
  cookie-secure: ${JWT_COOKIE_SECURE:false}             # prod 에선 docker-compose.prod.yml 이 true 박음

# 로깅 — LOG_FILE 환경변수 있으면 파일 출력, 없으면 콘솔만
# 로컬: LOG_FILE 안 박힘 → 콘솔만. prod: LOG_FILE=/var/log/landup/app.log 명시.
logging:
  level:
    root: INFO
    com.landup: INFO
    org.hibernate.SQL: WARN
  file:
    name: ${LOG_FILE:}
