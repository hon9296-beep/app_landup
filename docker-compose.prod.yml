services:
  # ── Java 백엔드 (Nginx 뒤 — 외부 직접 노출 X) ──────
  backend-java:
    image: ${ECR_REGISTRY}/${ECR_JAVA_REPOSITORY}:latest
    expose:
      - "8080"
    env_file:
      - .env
    environment:
      # ── prod 환경 분기 값 (로컬과 다르게 가는 부분만) ──
      FRONTEND_URL: https://landup.site         # 단일 도메인 진실 소스 — google/kakao redirect 자동 조립
      JWT_COOKIE_SECURE: "true"                 # HTTPS 강제 (refresh 쿠키 secure 속성)
      HIKARI_POOL_SIZE: "20"                    # DB pool (로컬 default 10 → prod 20)
      HIBERNATE_TIMEZONE: Asia/Seoul            # KST
      LOG_FILE: /var/log/landup/app.log         # 파일 로그 출력

      # ── docker 내부 호스트명 / 포트 ──
      SERVER_PORT: 8080
      PLACEMENT_ENGINE_URL: http://placement-engine:8000
      REDIS_HOST: redis
      REDIS_PORT: 6379

      # ── 시크릿 / DB (env_file 안전장치 중복 명시) ──
      # DB_HOST 는 docker 내부 호스트명 mysql 강제 (env_file 의 값 무시)
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      NAVER_CLIENT_ID: ${NAVER_CLIENT_ID:-}
      NAVER_CLIENT_SECRET: ${NAVER_CLIENT_SECRET:-}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-}
      AWS_S3_REGION: ${AWS_S3_REGION:-ap-northeast-2}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
    depends_on:
      mysql:
        condition: service_healthy
      placement-engine:
        condition: service_started
      redis:
        condition: service_started
    restart: unless-stopped

  # ── MySQL 8 (RDS 대체 — EC2 안에서 컨테이너로 직접 운영) ─────────────
  # 백업: cron + mysqldump → S3 (별도 운영 작업). volume 손실 = 데이터 손실.
  # init_v2.sql 은 최초 부팅 시 1회만 적용 (mysql-data volume 비어있을 때).
  mysql:
    image: mysql:8.0
    expose:
      - "3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      TZ: Asia/Seoul
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+09:00
    volumes:
      - mysql-data:/var/lib/mysql
      - ./db/init_v2.sql:/docker-entrypoint-initdb.d/init_v2.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      # start_period 60s: 첫 부팅 시 init_v2.sql (35테이블) 시간 여유 — EC2 첫 배포 race 방지.
      start_period: 60s
    restart: unless-stopped

  # ── Python 배치 엔진 (Java → Python 내부 호출) ────────
  placement-engine:
    image: ${ECR_REGISTRY}/${ECR_REPOSITORY}:latest
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-}
      AWS_S3_REGION: ${AWS_S3_REGION:-ap-northeast-2}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
    volumes:
      - ./references:/references
    depends_on:
      - redis
    restart: unless-stopped

  # ── Redis (arq 큐 브로커) ─────────────────────────────
  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  # ── 배치 워커 (Redis BRPOP 기반 비동기 작업 처리) ──────
  worker:
    image: ${ECR_REGISTRY}/${ECR_REPOSITORY}:latest
    command: ["python", "-m", "app.worker"]
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-}
      AWS_S3_REGION: ${AWS_S3_REGION:-ap-northeast-2}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      # Python → Java internal API (ref_image_client / register_ref_image / S3 upload / 분석 영속)
      JAVA_API_BASE: http://backend-java:8080/api
    volumes:
      - ./references:/references
    depends_on:
      - redis
    restart: unless-stopped

  # ── Nginx + certbot (HTTPS 자동 발급/갱신) ─────────────
  nginx:
    image: jonasal/nginx-certbot:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      CERTBOT_EMAIL: hon9296@gmail.com
    volumes:
      - ./nginx/user_conf.d:/etc/nginx/user_conf.d
      - letsencrypt:/etc/letsencrypt
    depends_on:
      - backend-java
      - placement-engine

volumes:
  redis-data:
  mysql-data:
  letsencrypt:
